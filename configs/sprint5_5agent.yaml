# Sprint 5 — 5-agent pipeline config
#
# This is the workload configuration for Step 3 (vLLM e2e demo) and
# Step 4 (head-to-head benchmark) of the Sprint 5 MI300X runbook.
#
# The pipeline implements a classic retrieval-augmented critic
# workflow where the CRITIC agent is the one INV-15 protects. When
# Apohara plugin is ON, the critic gets dense prefill (no KV reuse)
# any time the reuse risk score exceeds tau. When OFF, all 5 agents
# share the KV cache freely and we expect JCR to drop 8-23%
# (Liang et al. 2026, arXiv:2601.08343).
#
# Hardware target: 1× MI300X SR-IOV slice on AMD AI Dev Cloud.

apohara_pipeline:
  version: "v7.0.0-rc.2"
  model:
    name: "meta-llama/Llama-3-8B"
    dtype: "float16"
    max_model_len: 4096
    gpu_memory_utilization: 0.85
  inv15:
    enabled: true                # Set false for the OFF mode in head-to-head
    risk_threshold_tau: 0.65     # paper v2.0.1 §4 default
    judge_roles: ["critic", "judge", "evaluator"]
    audit_log_path: "logs/inv15_audit.jsonl"

agents:
  - id: retriever
    role: retriever
    system_prompt: |
      You are a retrieval agent. Given a user query, identify the
      top-3 facts from the context that are most relevant. Return
      only the facts, no commentary.
    apohara_role: retriever        # Non-judge — KV reuse allowed
    reuse_rate_observed: 0.8

  - id: reranker
    role: reranker
    system_prompt: |
      You are a reranker. Given the retrieved facts, rerank them
      by relevance to the user query. Top-1 wins.
    apohara_role: reranker
    reuse_rate_observed: 0.75

  - id: summarizer
    role: summarizer
    system_prompt: |
      You are a summarizer. Given the top-ranked fact, produce a
      concise 1-paragraph answer.
    apohara_role: summarizer
    reuse_rate_observed: 0.7

  - id: critic
    role: critic                   # ← This is the judge agent
    system_prompt: |
      You are a critic. Given the user query and the summarizer's
      answer, score the answer on three dimensions: factual
      accuracy (0-10), completeness (0-10), and clarity (0-10).
      Provide a single overall verdict: ACCEPT or REJECT.
    apohara_role: critic           # ← INV-15 gates KV reuse for this one
    reuse_rate_observed: 0.95      # ← Heavy reuse typical of warm-cache prod

  - id: responder
    role: responder
    system_prompt: |
      You are the responder. If critic verdict is ACCEPT, deliver
      the summarizer's answer to the user. If REJECT, request a
      retry from the summarizer with critic feedback.
    apohara_role: responder
    reuse_rate_observed: 0.6

# Workload parameters for the benchmark scripts
workload:
  n_requests: 500
  prompt_pool:
    - "What is the capital of France?"
    - "Who wrote 'War and Peace'?"
    - "What is the speed of light in m/s?"
    - "Explain quantum entanglement in one sentence."
    - "What is the chemical symbol for tungsten?"
  context_pool:
    - "Paris is the capital and most populous city of France."
    - "Leo Tolstoy wrote War and Peace, published in 1869."
    - "Light travels at approximately 299,792,458 m/s in vacuum."
    - "Quantum entanglement is a phenomenon where particles share correlated states."
    - "Tungsten has the chemical symbol W, from its German name Wolfram."
  request_distribution: "uniform"   # uniform | weighted
  candidate_count_per_request: 10   # typical RAG: top-10 candidates per agent
  layout_shuffled: false             # conservative; flip to true if testing aggressive reuse

# Lobster Trap perimeter proxy config (TechEx Day 2 integration)
# When `enabled: true` or `--lobstertrap-endpoint` CLI flag is set, all
# agent requests route through Lobster Trap before reaching the LLM.
# Policy file: configs/lobstertrap_policy.yaml.
# Binary built from github.com/veeainc/lobstertrap (MIT, Go 1.22+).
lobster_trap:
  enabled: false                   # Set true OR pass --lobstertrap-endpoint to override
  endpoint: "http://localhost:8080"
  policy_path: "configs/lobstertrap_policy.yaml"
  declare_agent_intents: true      # send _lobstertrap.declared_intent per agent

# LMCache backend config (uses CodecV8Quantizer + LMCacheConnectorV2)
lmcache:
  enabled: true
  backend: "non_cuda"              # AMD ROCm path
  chunk_size: 256
  local_device: "cuda"             # Note: PyTorch ROCm reuses torch.cuda.* API
  remote_url: null                 # Single-node setup; multi-node would point to Redis

# Output paths (all under logs/)
output:
  vllm_e2e:        "logs/mi300x_vllm_e2e_{timestamp}.json"
  head_to_head:    "logs/mi300x_h2h_{mode}_{timestamp}.json"
  inv15_audit:     "logs/inv15_audit_{timestamp}.jsonl"
  grafana_metrics: "logs/grafana_snapshot_{timestamp}.json"
