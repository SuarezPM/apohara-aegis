# Apohara Aegis — TechEx 2026 public demo compose stack.
#
# Services (4):
#
#   mock-llm     :9999   Tiny stub OpenAI-compatible backend so Lobster Trap
#                        has something to forward ALLOW'd requests to. The
#                        demo is about the defense layer, not the LLM — we
#                        return a canned chat completion so judges see a
#                        valid end-to-end roundtrip.
#
#   lobstertrap  :8080   Veea Lobster Trap proxy. Loads
#                        configs/lobstertrap_policy.yaml from the repo and
#                        forwards to mock-llm on :9999.
#
#   aegis-ui     :7860   Gradio "Try to break our trust layer" UI from
#                        scripts/jbb_live_defense.py. LOBSTERTRAP_ENDPOINT
#                        points at the in-network lobstertrap service so
#                        every prompt routes through the policy.
#
#   caddy        :80,443 Reverse proxy + auto-TLS via Let's Encrypt for
#                        ${AEGIS_SITE} (set to <publicIP>.nip.io by
#                        cloud-init). Routes:
#                            /        -> aegis-ui:7860
#                            /lt/     -> lobstertrap:8080  (strip prefix)
#                            /audit   -> served from /srv/audit by caddy
#
# Logs go to the named volume ``apohara-aegis-logs`` (mounted into the UI
# container at /opt/apohara-aegis/logs).

services:

  mock-llm:
    image: python:3.11-slim
    container_name: aegis-mock-llm
    restart: unless-stopped
    networks: [aegisnet]
    # Phase-4 hardening (2026-05-14): drop root. uid 65532 == distroless
    # "nonroot" convention; matches the lobstertrap upstream image. The
    # mock-llm has no volumes and only needs to run a stock python3
    # binary (world-executable), so a non-root user works out of the box.
    user: "65532:65532"
    # Inline server: a 50-line FastAPI-free stdlib BaseHTTPServer that
    # speaks the bare minimum of OpenAI's /v1/chat/completions API.
    # Lives in the same compose file (not a separate Dockerfile) to keep
    # the deploy/ surface small.
    command:
      - python3
      - -c
      - |
        import json, time
        from http.server import BaseHTTPRequestHandler, HTTPServer

        class Handler(BaseHTTPRequestHandler):
            def log_message(self, *a, **kw): pass  # quiet
            def _send(self, code, body):
                payload = json.dumps(body).encode()
                self.send_response(code)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(payload)))
                self.end_headers()
                self.wfile.write(payload)
            def do_POST(self):
                if self.path != "/v1/chat/completions":
                    return self._send(404, {"error": "not found"})
                _ = self.rfile.read(int(self.headers.get("Content-Length", 0)))
                return self._send(200, {
                    "id": "mock-llm-" + str(int(time.time())),
                    "object": "chat.completion",
                    "created": int(time.time()),
                    "model": "apohara-aegis-mock",
                    "choices": [{
                        "index": 0,
                        "message": {
                            "role": "assistant",
                            "content": (
                                "[mock backend] This is a canned response. "
                                "The defense layer (Lobster Trap + Aegis "
                                "policy) is what the TechEx judges are "
                                "evaluating; the LLM is intentionally stubbed."
                            ),
                        },
                        "finish_reason": "stop",
                    }],
                    "usage": {"prompt_tokens": 0, "completion_tokens": 0, "total_tokens": 0},
                })
            def do_GET(self):
                if self.path == "/healthz":
                    return self._send(200, {"ok": True})
                return self._send(404, {"error": "not found"})

        HTTPServer(("0.0.0.0", 9999), Handler).serve_forever()
    expose:
      - "9999"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9999/healthz', timeout=3)"]
      interval: 15s
      timeout: 4s
      retries: 5

  lobstertrap:
    # Build Lobster Trap from upstream MIT source. Multi-stage: golang build
    # -> distroless runtime. We pin to HEAD on the upstream main branch as
    # of 2026-05-13 (see docs/lobstertrap-integration.md).
    build:
      context: .
      dockerfile: Dockerfile.lobstertrap
    container_name: aegis-lobstertrap
    restart: unless-stopped
    networks: [aegisnet]
    depends_on:
      mock-llm:
        condition: service_healthy
    volumes:
      # Mount the repo's lobster trap policy read-only.
      - ../configs/lobstertrap_policy.yaml:/etc/lobstertrap/policy.yaml:ro
    command:
      - serve
      - --policy
      - /etc/lobstertrap/policy.yaml
      - --backend
      - http://mock-llm:9999
      - --listen
      - :8080
      - --no-dashboard
    expose:
      - "8080"

  aegis-ui:
    image: python:3.11-slim
    container_name: aegis-ui
    restart: unless-stopped
    networks: [aegisnet]
    depends_on:
      - lobstertrap
    working_dir: /opt/apohara-aegis
    # Phase-4 hardening (2026-05-14): drop root. uid 65532 matches the
    # distroless "nonroot" convention. `pip install --user` goes to
    # PYTHONUSERBASE on tmpfs so we do not need to chown the
    # /usr/local/lib/python3.11/site-packages dir. The bind-mounted
    # repo is rw because the JBB defense script writes JSON reports to
    # logs/; cloud-init chmods that dir 1777 (sticky world-write) so a
    # non-root uid in the container can persist evidence files.
    user: "65532:65532"
    volumes:
      - ..:/opt/apohara-aegis
    environment:
      LOBSTERTRAP_ENDPOINT: "http://lobstertrap:8080"
      PYTHONPATH: "/opt/apohara-aegis"
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
      # Tell Gradio that it's running behind a reverse proxy at /.
      GRADIO_ROOT_PATH: ""
      # `pip install --user` destination — writable tmpfs path.
      HOME: "/tmp/aegis-home"
      PYTHONUSERBASE: "/tmp/aegis-pip"
      PATH: "/tmp/aegis-pip/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      # Phase-3 judge stack (2026-05-14): pull the Gemini key from the
      # host-level .env file written by cloud-init. Both var names are
      # set so the google-generativeai SDK picks it up regardless of
      # which env var it prefers (GEMINI_API_KEY is the canonical one,
      # GOOGLE_API_KEY is the historical alias). Lobster Trap deliberately
      # does NOT see this key — only the Aegis judge in aegis-ui calls
      # AI Studio.
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GOOGLE_API_KEY: "${GEMINI_API_KEY:-}"
      # Calibrated threshold from logs/jbb_defense_full_20260514T195225Z.json
      # (commit 6636f8e). Module-level default in apohara_aegis/gemini_judge.py
      # is also 0.5; we set it explicitly so operators see the value in
      # `docker inspect aegis-ui` without having to read the source.
      CALIBRATED_JUDGE_THRESHOLD: "0.5"
    tmpfs:
      # User home + pip --user prefix. Ephemeral; recreated each restart.
      # `exec` is REQUIRED on /tmp/aegis-pip: pip --user installs C
      # extensions (numpy, etc.) as .so shared libraries that Python
      # must mmap-exec. Without exec the import fails with
      # "failed to map segment from shared object". The cost of allowing
      # exec on this single tmpfs is small (only the aegis user can
      # write here; uid 65532 == non-root). /tmp/aegis-home stays noexec.
      - /tmp/aegis-home:uid=65532,gid=65532,mode=0700,noexec
      - /tmp/aegis-pip:uid=65532,gid=65532,mode=0700,exec
    command:
      - bash
      - -c
      - |
        set -e
        pip install --user --no-cache-dir -q \
          -r /opt/apohara-aegis/requirements.txt
        exec python3 /opt/apohara-aegis/scripts/jbb_live_defense.py
    expose:
      - "7860"

  caddy:
    image: caddy:2.8
    container_name: aegis-caddy
    restart: unless-stopped
    networks: [aegisnet]
    depends_on:
      - aegis-ui
      - lobstertrap
    ports:
      - "80:80"
      - "443:443"
    environment:
      # AEGIS_SITE is supplied via deploy/.env written by cloud-init
      # (e.g. "1.2.3.4.nip.io"). Caddy auto-provisions a Let's Encrypt
      # certificate for that hostname.
      AEGIS_SITE: "${AEGIS_SITE:-localhost}"
      # Judge basicauth (Phase-4 hardening, 2026-05-14). cloud-init
      # propagates AEGIS_JUDGE_USER / AEGIS_JUDGE_PASS_HASH from
      # operator env into deploy/.env so docker compose passes them
      # through to Caddy. Falls back to the baked-in defaults in the
      # Caddyfile when unset.
      AEGIS_JUDGE_USER: "${AEGIS_JUDGE_USER:-judge}"
      AEGIS_JUDGE_PASS_HASH: "${AEGIS_JUDGE_PASS_HASH:-}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../assets:/srv/audit:ro
      - caddy_data:/data
      - caddy_config:/config

networks:
  aegisnet:
    driver: bridge

volumes:
  # apohara-aegis-logs removed in Phase-4 hardening (2026-05-14): logs
  # now persist directly in /opt/apohara-aegis/logs on the host (chmod
  # 1777 by cloud-init), readable via `ssh aegis@<IP>` for evidence.
  caddy_data:
  caddy_config:
