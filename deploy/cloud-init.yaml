#cloud-config
# Apohara Aegis — TechEx 2026 public demo droplet bootstrap.
#
# Runs on first boot of the Ubuntu 24.04 instance provisioned by
# deploy/vultr_provision.py. Idempotent enough to re-run safely if a
# step fails midway (cloud-init replays from runcmd: each invocation
# is wrapped in `|| true` or check-and-skip guards).
#
# Cost note: this instance runs 24/7 at ~$0.20/day. Tear down via
# `python3 deploy/vultr_provision.py --destroy` when the demo window
# (May 14-26, 2026) closes.
#
# Security posture (Phase-4 reviewer hardening, 2026-05-14):
#   - Root password login is disabled; root SSH is disabled.
#   - A non-root sudoer ``aegis`` is created with a single SSH pubkey
#     read from the AEGIS_SSH_PUBKEY env var by vultr_provision.py.
#     If AEGIS_SSH_PUBKEY is unset at provision time, the provisioner
#     aborts BEFORE any Vultr API call — there is no silent fallback
#     to password auth.
#   - Judge basicauth credentials are passed in via env (AEGIS_JUDGE_USER
#     / AEGIS_JUDGE_PASS_HASH) and propagated to docker-compose via
#     /opt/apohara-aegis/deploy/.env. Default values in deploy/Caddyfile
#     are documented in deploy/README.md "Security posture".

# ---- Disable root login + password auth -----------------------------------
disable_root: true
ssh_pwauth: false

# ---- Create non-root sudoer user with operator SSH pubkey -----------------
# AEGIS_SSH_PUBKEY_PLACEHOLDER is replaced by vultr_provision.py at
# provision time with the contents of the AEGIS_SSH_PUBKEY env var.
# Vultr base64-encodes the substituted YAML and feeds it to cloud-init.
users:
  - name: aegis
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    groups: [docker, sudo]
    lock_passwd: true
    ssh_authorized_keys:
      - AEGIS_SSH_PUBKEY_PLACEHOLDER

package_update: true
package_upgrade: false  # avoid 5-minute kernel upgrade on first boot

packages:
  - ca-certificates
  - curl
  - git
  - gnupg
  - lsb-release
  - ufw

write_files:
  - path: /opt/aegis/.bootstrap.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      # Bootstrap the Apohara Aegis demo stack. Idempotent.
      set -euo pipefail

      LOG=/var/log/apohara-aegis-bootstrap.log
      exec >>"$LOG" 2>&1
      echo "=== aegis-bootstrap start: $(date -Iseconds) ==="

      # ----- 1. Docker engine (official Debian repo install path) ------------
      if ! command -v docker >/dev/null 2>&1; then
        echo "[1/5] Installing Docker engine..."
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
        . /etc/os-release
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/ubuntu $VERSION_CODENAME stable" \
          >/etc/apt/sources.list.d/docker.list
        apt-get update -y
        apt-get install -y docker-ce docker-ce-cli containerd.io \
          docker-buildx-plugin docker-compose-plugin
      else
        echo "[1/5] Docker already installed; skipping."
      fi

      systemctl enable --now docker

      # ----- 2. Clone the apohara-aegis repo ---------------------------------
      if [ ! -d /opt/apohara-aegis/.git ]; then
        echo "[2/5] Cloning apohara-aegis..."
        rm -rf /opt/apohara-aegis
        git clone --depth=1 https://github.com/SuarezPM/apohara-aegis \
          /opt/apohara-aegis
      else
        echo "[2/5] Repo already cloned; pulling latest main..."
        git -C /opt/apohara-aegis fetch origin main || true
        git -C /opt/apohara-aegis reset --hard origin/main || true
      fi

      # Make logs/ world-writable so the non-root aegis-ui container
      # (uid 65532) can persist JBB defense reports. The rest of the repo
      # stays at the cloned default ownership. Phase-4 hardening
      # (2026-05-14): aegis-ui no longer runs as root.
      mkdir -p /opt/apohara-aegis/logs
      chmod 1777 /opt/apohara-aegis/logs

      # ----- 3. Discover public IP for Caddy site address --------------------
      # nip.io maps <ip>.nip.io -> <ip> via wildcard DNS, so Let's Encrypt
      # auto-issues a certificate without us configuring real DNS.
      PUBLIC_IP="$(curl -fsS -m 10 https://api.ipify.org || \
                   curl -fsS -m 10 https://ifconfig.me || \
                   hostname -I | awk '{print $1}')"
      echo "[3/5] Public IP detected: $PUBLIC_IP"

      mkdir -p /opt/apohara-aegis/deploy
      # AEGIS_SITE is consumed by Caddyfile via env-var substitution.
      # AEGIS_JUDGE_USER / AEGIS_JUDGE_PASS_HASH are substituted by
      # vultr_provision.py from the equally named env vars before this
      # YAML is shipped to cloud-init. Defaults are intentionally
      # left empty here so Caddy falls back to the baked-in defaults
      # in deploy/Caddyfile when an operator forgot to set them.
      #
      # Phase-3 (2026-05-14): GEMINI_API_KEY is substituted in the same way
      # by vultr_provision.py from the operator's env at provision time —
      # the literal value never lives in this YAML on disk, only in the
      # base64-encoded user_data blob shipped to Vultr. The aegis-ui
      # container reads it from this .env via docker-compose's variable
      # substitution. Lobster Trap deliberately does NOT see this key.
      cat >/opt/apohara-aegis/deploy/.env <<EOF
      AEGIS_SITE=${PUBLIC_IP}.nip.io
      AEGIS_JUDGE_USER=AEGIS_JUDGE_USER_PLACEHOLDER
      AEGIS_JUDGE_PASS_HASH=AEGIS_JUDGE_PASS_HASH_PLACEHOLDER
      GEMINI_API_KEY=GEMINI_API_KEY_PLACEHOLDER
      EOF
      # Tighten perms: only root + the docker daemon's compose reader
      # should see this file. The aegis user (in the docker group) reads
      # it indirectly via `docker compose up`. 0600 owned by root keeps
      # the key off the box's `aegis` shell history / world-readable paths.
      chown root:root /opt/apohara-aegis/deploy/.env
      chmod 0600 /opt/apohara-aegis/deploy/.env

      # ----- 4. Firewall (UFW): only 22, 80, 443 inbound ---------------------
      echo "[4/5] Configuring UFW..."
      ufw --force reset
      ufw default deny incoming
      ufw default allow outgoing
      ufw allow 22/tcp comment "ssh"
      ufw allow 80/tcp comment "http (caddy + acme http-01)"
      ufw allow 443/tcp comment "https (caddy)"
      ufw --force enable

      # ----- 5. Bring up docker-compose stack --------------------------------
      echo "[5/5] docker compose up -d..."
      cd /opt/apohara-aegis/deploy
      # Use the compose file in this directory.
      docker compose pull || true
      docker compose up -d --build

      echo "=== aegis-bootstrap done: $(date -Iseconds) ==="
      echo "Public URL should be live at: https://${PUBLIC_IP}.nip.io/"

runcmd:
  - [ bash, /opt/aegis/.bootstrap.sh ]

final_message: |
  Apohara Aegis cloud-init bootstrap finished at $TIMESTAMP after $UPTIME seconds.
  Tail /var/log/apohara-aegis-bootstrap.log to verify docker compose came up.
  The public URL is https://<IP>.nip.io/ — Caddy TLS issuance takes ~30s on first hit.
  Judge basicauth is enabled on / and /lt/* (only /audit is public).
  SSH as: ssh aegis@<IP> (root login is disabled).
